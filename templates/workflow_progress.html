{% extends "base.html" %}

{% block content %}
<div class="page-title">任务进度</div>

<div class="workflow-page">
    <div class="workflow-card">
        <div class="workflow-card-header">
            <div class="workflow-card-title">单帖自动分析进度</div>
            <div class="workflow-card-desc">
                系统将依次执行爬虫、入库、主题分析、情感分析、风险判断，并在完成后跳转到单帖可视化页面。
            </div>
        </div>

        <div class="task-meta-grid">
            <div class="task-meta-item">
                <span class="task-meta-label">任务ID</span>
                <span class="task-meta-value" id="taskIdValue">{{ task_id }}</span>
            </div>
            <div class="task-meta-item">
                <span class="task-meta-label">状态</span>
                <span class="task-status-badge running" id="taskStatusBadge">加载中</span>
            </div>
            <div class="task-meta-item full">
                <span class="task-meta-label">当前阶段</span>
                <span class="task-meta-value" id="taskStage">-</span>
            </div>
            <div class="task-meta-item full">
                <span class="task-meta-label">阶段说明</span>
                <span class="task-meta-value" id="taskMessage">-</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-top">
                <span>总体进度</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-track">
                <div id="progressBar" class="progress-bar-fill">0%</div>
            </div>
        </div>

        <div class="task-step-list">
            <div class="task-step-item" id="step-crawling">1. 爬虫抓取评论</div>
            <div class="task-step-item" id="step-storing">2. 数据写入数据库</div>
            <div class="task-step-item" id="step-theme">3. 主题分析</div>
            <div class="task-step-item" id="step-sentiment">4. 情感分析</div>
            <div class="task-step-item" id="step-risk">5. 风险判断与更新</div>
            <div class="task-step-item" id="step-done">6. 生成单帖分析页</div>
        </div>

        <div id="taskSuccessBox" class="task-result-box success-box" style="display:none;">
            <div class="result-title">分析完成</div>
            <div class="result-desc" id="successText">任务已完成。</div>
            <a id="resultLink" class="primary-btn" href="#">进入单帖可视化页面</a>
        </div>

        <div id="taskErrorBox" class="task-result-box error-box" style="display:none;">
            <div class="result-title">任务执行失败</div>
            <div class="result-desc" id="errorSummary">请检查错误信息并重新提交任务。</div>
            <details class="error-details">
                <summary>查看详细报错</summary>
                <pre id="errorTrace">暂无错误详情</pre>
            </details>
        </div>
    </div>
</div>

<script>
function setStatusBadge(status) {
    const badge = document.getElementById("taskStatusBadge");
    badge.className = "task-status-badge";

    if (status === "SUCCESS") {
        badge.classList.add("success");
        badge.innerText = "已完成";
    } else if (status === "FAILED") {
        badge.classList.add("failed");
        badge.innerText = "失败";
    } else if (status === "RUNNING") {
        badge.classList.add("running");
        badge.innerText = "运行中";
    } else {
        badge.classList.add("pending");
        badge.innerText = status || "待处理";
    }
}

function setProgress(percent) {
    const bar = document.getElementById("progressBar");
    const text = document.getElementById("progressText");
    const safePercent = Math.max(0, Math.min(100, percent || 0));

    bar.style.width = safePercent + "%";
    bar.innerText = safePercent + "%";
    text.innerText = safePercent + "%";
}

function resetSteps() {
    const ids = [
        "step-crawling",
        "step-storing",
        "step-theme",
        "step-sentiment",
        "step-risk",
        "step-done"
    ];
    ids.forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove("active-step", "done-step");
    });
}

function highlightStep(stage) {
    resetSteps();

    const map = {
        "爬取评论": ["step-crawling"],
        "写入数据库": ["step-crawling", "step-storing"],
        "主题分析": ["step-crawling", "step-storing", "step-theme"],
        "情感分析": ["step-crawling", "step-storing", "step-theme", "step-sentiment"],
        "风险判断": ["step-crawling", "step-storing", "step-theme", "step-sentiment", "step-risk"],
        "分析完成": ["step-crawling", "step-storing", "step-theme", "step-sentiment", "step-risk", "step-done"]
    };

    let matched = [];
    for (const key in map) {
        if ((stage || "").includes(key)) {
            matched = map[key];
        }
    }

    matched.forEach((id, index) => {
        const el = document.getElementById(id);
        if (index < matched.length - 1) {
            el.classList.add("done-step");
        } else {
            el.classList.add("active-step");
        }
    });
}

function simplifyError(errorText) {
    if (!errorText) return "任务执行失败，请检查配置或脚本。";
    if (errorText.includes("DEEPSEEK_API_KEY")) {
        return "未检测到 DeepSeek API Key，主题分析阶段无法继续执行。";
    }
    return "任务执行失败，请展开查看详细报错。";
}

async function refreshTask() {
    const res = await fetch("/api/workflow/task/{{ task_id }}");
    const data = await res.json();

    const status = data.task_status || "PENDING";
    const stage = data.current_stage || "-";
    const message = data.task_message || "-";
    const percent = data.progress_percent || 0;

    document.getElementById("taskStage").innerText = stage;
    document.getElementById("taskMessage").innerText = message;

    setStatusBadge(status);
    setProgress(percent);
    highlightStep(stage);

    const successBox = document.getElementById("taskSuccessBox");
    const errorBox = document.getElementById("taskErrorBox");

    successBox.style.display = "none";
    errorBox.style.display = "none";

    if (status === "SUCCESS" && data.post_id) {
        successBox.style.display = "block";
        document.getElementById("successText").innerText =
            `分析完成，post_id=${data.post_id}，现在可以查看单帖分析结果。`;
        document.getElementById("resultLink").href = `/post/${data.post_id}`;
        return;
    }

    if (status === "FAILED") {
        errorBox.style.display = "block";
        document.getElementById("errorSummary").innerText =
            simplifyError(data.error_message || "");
        document.getElementById("errorTrace").innerText =
            data.error_message || "暂无错误详情";
        return;
    }

    setTimeout(refreshTask, 1500);
}

refreshTask();
</script>
{% endblock %}
