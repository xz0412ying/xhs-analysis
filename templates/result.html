<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成式AI伦理风险公众认知分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .result-info {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        
        .result-info p {
            margin: 10px 0;
            font-size: 16px;
        }
        
        .result-info .url {
            word-break: break-all;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #666;
            background: #e9ecef;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
        }
        
        .download-btn {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .preview {
            margin-top: 30px;
        }
        
        .preview h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }
        
        .comment-item {
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .comment-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .comment-item .id {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .comment-item .title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .comment-item .content {
            margin-bottom: 12px;
            line-height: 1.5;
            color: #333;
        }
        
        .comment-item .meta {
            font-size: 14px;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>数据采集结果</h1>
        
        <div class="result-info">
            <p><strong>帖子URL：</strong><span class="url">{{ url }}</span></p>
            <p><strong>帖子标题：</strong>{{ title }}</p>
            <p><strong>爬取评论数量：</strong>{{ comment_count }} 条</p>
            <a href="/download/{{ excel_filename }}" class="download-btn">下载Excel文件</a>
        </div>
        
        <div class="preview">
            <h2>前10条评论预览</h2>
            {% for comment in preview_comments %}
            <div class="comment-item">
                <div class="id">ID: {{ comment.id }}</div>
                <div class="title">标题: {{ comment.title }}</div>
                <div class="content">{{ comment.content }}</div>
                <div class="meta">
                    <span>点赞: {{ comment.likes }}</span>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <a href="/" class="back-link">返回首页</a>
    </div>
</body>
</html>
